<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Russell Dudek | Coastal VP of AI Candidate Vision</title>
<style>
:root{--navy:#062C49;--teal:#13B8C7;--coral:#FF6B5A;--sand:#F8F3EA;--line:#D7E7E8;--muted:#607680}
*{box-sizing:border-box}html,body{height:100%;margin:0}body{display:grid;place-items:center;background:linear-gradient(145deg,#F8F3EA,#EFF8F8);color:var(--navy);font-family:Arial,Helvetica,sans-serif;overflow:hidden}.loader{text-align:center;max-width:620px;padding:34px}.flag{width:58px;height:58px;margin:0 auto 20px;position:relative;overflow:hidden;border:2px solid var(--navy);background:#fff;animation:float 2.6s ease-in-out infinite}.flag:before{content:"";position:absolute;inset:0 50% 0 0;background:var(--teal)}.flag:after{content:"";position:absolute;left:50%;top:0;border-top:29px solid var(--coral);border-bottom:29px solid transparent;border-left:29px solid transparent}.loader strong{display:block;font-size:1.55rem;letter-spacing:-.03em}.loader p{color:var(--muted);margin:8px 0 18px}.bar{height:6px;background:var(--line);overflow:hidden;border-radius:99px}.bar span{display:block;width:34%;height:100%;background:linear-gradient(90deg,var(--teal),var(--coral));animation:load 1.15s ease-in-out infinite alternate}.status{font-size:.82rem;margin-top:12px;color:var(--muted)}@keyframes load{to{transform:translateX(195%)}}@keyframes float{50%{transform:translateY(-7px) rotate(.5deg)}}@media(prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
<div class="loader" id="loader"><div class="flag"></div><strong>Coastal AI Practice Candidate Vision</strong><p>Reading the signals…</p><div class="bar"><span></span></div><div class="status" id="status">Loading 0 of 8</div></div>
<noscript>This candidate vision requires JavaScript to load.</noscript>
<script>
(async()=>{
  const files=Array.from({length:8},(_,i)=>`site.parts/part-${String(i+1).padStart(3,'0')}.txt`);
  const status=document.getElementById('status');
  const timeout=(ms)=>new Promise((_,reject)=>setTimeout(()=>reject(new Error('Loading timed out. Please refresh.')),ms));
  const loadPromise=(async()=>{
    let complete=0;
    const chunks=await Promise.all(files.map(async(file)=>{
      const response=await fetch(`${file}?v=3`,{cache:'no-store'});
      if(!response.ok) throw new Error(`${file} returned ${response.status}`);
      const text=(await response.text()).replace(/\s+/g,'');
      complete+=1;
      status.textContent=`Loading ${complete} of ${files.length}`;
      return text;
    }));
    const encoded=chunks.join('');
    if(!encoded) throw new Error('The candidate vision payload was empty.');
    const binary=atob(encoded);
    const bytes=new Uint8Array(binary.length);
    for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
    let page=new TextDecoder('utf-8').decode(bytes);
    if(!/<html[\s>]/i.test(page)) throw new Error('The candidate vision payload did not decode correctly.');
    if(!/<base\s/i.test(page)) page=page.replace(/<head>/i,'<head><base href="/coastal/">');
    document.open('text/html','replace');
    document.write(page);
    document.close();
  })();
  await Promise.race([loadPromise,timeout(20000)]);
})().catch(error=>{
  const loader=document.getElementById('loader');
  loader.innerHTML='<div class="flag"></div><strong>Unable to load the candidate vision</strong><p>'+error.message+'</p><p><a href="resume.html">Open the résumé</a> · <a href="cover-letter.html">Open the cover letter</a></p>';
});
</script>
</body>
</html>
