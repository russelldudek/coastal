name: Deploy Coastal candidate site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Persist versioned page refinements into branch source
        run: |
          python - <<'PY'
          from pathlib import Path

          targets = {
              "index.html": ("site-enhancements.css", "20260710-3"),
              "resume.html": ("resume-print.css", "20260710-3"),
          }

          for html_name, (css_name, version) in targets.items():
              path = Path(html_name)
              text = path.read_text(encoding="utf-8")
              plain = f'<link rel="stylesheet" href="{css_name}">'
              versioned = f'<link rel="stylesheet" href="{css_name}?v={version}">'

              # Replace an existing unversioned link or any prior version.
              import re
              pattern = rf'<link rel="stylesheet" href="{re.escape(css_name)}(?:\?v=[^"]+)?">'
              if re.search(pattern, text):
                  text = re.sub(pattern, versioned, text)
              else:
                  text = text.replace("</head>", versioned + "\n</head>")
              path.write_text(text, encoding="utf-8")
          PY

      - name: Commit source links when needed
        run: |
          if git diff --quiet; then
            echo "No source link changes needed."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html resume.html
            git commit -m "Version Coastal refinement assets for Pages cache refresh"
            git push origin HEAD:main
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
